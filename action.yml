name: 'Publish Browser Extension'
description: 'Upload and publish browser extensions to Chrome Web Store, Firefox Add-ons, and Edge Add-ons.'
author: 'creeperkatze'

branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  # Chrome Web Store
  chrome-client-id:
    description: >
      OAuth2 client ID from Google Cloud Console.
      Required for Chrome Web Store publishing.
    required: false

  chrome-client-secret:
    description: >
      OAuth2 client secret from Google Cloud Console.
      Required for Chrome Web Store publishing.
    required: false

  chrome-refresh-token:
    description: >
      Long-lived OAuth2 refresh token used to obtain short-lived access tokens.
      Required for Chrome Web Store publishing.
    required: false

  chrome-publisher-id:
    description: >
      Publisher ID found in the Chrome Developer Dashboard under Publisher > Settings.
      Required for Chrome Web Store publishing.
    required: false

  chrome-extension-id:
    description: >
      The extension item ID in the Chrome Web Store (e.g. "aapbdbdomjkkjkaonfhkkikfgjllcleb").
      Required for Chrome Web Store publishing.
    required: false

  chrome-zip-path:
    description: >
      Path to the extension .zip file to upload to the Chrome Web Store.
      Required for Chrome Web Store publishing.
    required: false

  chrome-publish:
    description: >
      Whether to publish the extension after a successful upload.
      Set to "false" to only upload without publishing (e.g. for draft review).
    required: false
    default: 'true'

  chrome-publish-type:
    description: >
      Controls publication timing.
      - "DEFAULT_PUBLISH": publish immediately to all users.
      - "STAGED_PUBLISH": defer to a staged rollout controlled by chrome-deploy-percentage.
    required: false
    default: 'DEFAULT_PUBLISH'

  chrome-deploy-percentage:
    description: >
      Percentage of users (0-100) to roll out to when using STAGED_PUBLISH.
      Ignored when chrome-publish-type is DEFAULT_PUBLISH.
    required: false

  chrome-skip-review:
    description: >
      Attempt to bypass the Chrome Web Store review process if the item is eligible.
      Returns a validation error if the item still requires review.
    required: false
    default: 'false'

  # Firefox Add-ons
  firefox-api-key:
    description: >
      AMO API key (issuer) obtained from addons.mozilla.org/developers/addon/api/key/.
      Required for Firefox Add-ons publishing.
    required: false

  firefox-api-secret:
    description: >
      AMO API secret used to sign JWT tokens.
      Required for Firefox Add-ons publishing.
    required: false

  firefox-extension-id:
    description: >
      The add-on ID, slug, or GUID (e.g. "{your-addon@example.com}").
      Required when publishing a new version of an existing add-on.
    required: false

  firefox-xpi-path:
    description: >
      Path to the .xpi (or .zip) file to upload to Firefox Add-ons.
      Required for Firefox Add-ons publishing.
    required: false

  firefox-channel:
    description: >
      Distribution channel for the uploaded file.
      - "listed": publicly listed on addons.mozilla.org, requires review.
      - "unlisted": self-distributed, available immediately without review.
    required: false
    default: 'listed'

  firefox-license:
    description: >
      License slug applied to the new version (e.g. "mpl-2.0", "mit", "apache-2.0").
      Required for listed add-ons. Ignored for unlisted.
    required: false

  firefox-approval-notes:
    description: >
      Internal notes for Mozilla reviewers. Not visible to users.
    required: false

  firefox-release-notes:
    description: >
      Version-specific release notes shown to users on AMO.
      Supports a plain string or a JSON object keyed by locale (e.g. '{"en-US":"..."}').
    required: false

  # Edge Add-ons
  edge-api-key:
    description: >
      API key from Partner Center (Publish API page).
      Required for Edge Add-ons publishing.
    required: false

  edge-client-id:
    description: >
      Client ID from Partner Center (Publish API page).
      Required for Edge Add-ons publishing.
    required: false

  edge-product-id:
    description: >
      Product ID (128-bit GUID) of the extension in Partner Center.
      Found in the Extension overview page or in the dashboard URL.
    required: false

  edge-zip-path:
    description: >
      Path to the .zip file to upload to Microsoft Edge Add-ons.
      Required for Edge Add-ons publishing.
    required: false

  edge-publish:
    description: >
      Whether to publish the draft after a successful upload.
      Set to "false" to only upload the package without submitting for review.
    required: false
    default: 'true'

  edge-notes:
    description: >
      Certification notes for Microsoft reviewers.
    required: false

outputs:
  # Chrome Web Store
  chrome-upload-state:
    description: >
      Upload state returned by the Chrome Web Store API after the upload step.
      Possible values: UPLOAD_STATE_UNSPECIFIED, SUCCESS, FAILURE, IN_PROGRESS, NOT_FOUND.

  chrome-crx-version:
    description: >
      Extension version read from the manifest inside the uploaded package.
      Empty while an upload is still in progress.

  chrome-publish-state:
    description: >
      Submission state returned by the Chrome Web Store API after the publish step.
      Possible values: ITEM_PENDING_REVIEW, PUBLISHED, REJECTED, REMOVED, etc.

  chrome-item-id:
    description: >
      Item identifier echoed back by the Chrome Web Store API.

  # Firefox Add-ons
  firefox-upload-uuid:
    description: >
      UUID of the uploaded file returned by the AMO upload endpoint.
      Useful for debugging or chaining with other steps.

  firefox-version-id:
    description: >
      Numeric ID of the newly created add-on version on AMO.

  firefox-version-state:
    description: >
      Review state of the new version after submission.
      Typical values: nominated, public, disabled, beta, etc.

  # Edge Add-ons
  edge-upload-operation-id:
    description: >
      Operation ID returned in the Location header after a successful package upload.

  edge-upload-status:
    description: >
      Final status of the upload operation.
      Possible values: Succeeded, Failed, InProgress.

  edge-publish-operation-id:
    description: >
      Operation ID returned in the Location header after triggering publish.

  edge-publish-status:
    description: >
      Final status of the publish operation.
      Possible values: Succeeded, Failed, InProgress.

runs:
  using: 'node24'
  main: 'dist/index.js'
